<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">JP favicon</title>
  <defs>
    <linearGradient id="mark-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e7490"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="mark-dark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>
  
  <text x="32" y="34" text-anchor="middle" dominant-baseline="middle" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="34" font-weight="700" letter-spacing="-1">
    <tspan fill="url(#mark-light)" class="jp-text">JP</tspan><tspan fill="#334155" class="dot-text">.</tspan>
  </text>
  
  <style>
    @media (prefers-color-scheme: dark) {
      .jp-text { fill: url(#mark-dark); }
      .dot-text { fill: #cbd5e1; }
    }
  </style>
</svg>
