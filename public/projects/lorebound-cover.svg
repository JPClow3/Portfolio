<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title description">
  <title id="title">Lorebound interactive-fiction concept cover</title>
  <desc id="description">A dark indigo story map with luminous paths, chapter cards, and the Lorebound wordmark.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090d22"/>
      <stop offset="0.55" stop-color="#151044"/>
      <stop offset="1" stop-color="#251151"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="720" fill="url(#background)"/>
  <g opacity=".22" stroke="#a78bfa" fill="none"><path d="M0 92C236 24 381 201 612 128s314-12 588-98"/><path d="M0 632c176-72 312 36 519-35s366-69 681-7"/></g>
