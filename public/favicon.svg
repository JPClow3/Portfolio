<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">JP favicon</title>
  <defs>
    <linearGradient id="mark" x1="10" y1="8" x2="54" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0891b2"/>
      <stop offset=".55" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="#f8fafc"/>
  <rect x="5" y="5" width="54" height="54" rx="11" fill="#e0f2fe" stroke="#94a3b8" stroke-opacity=".45"/>
  <g filter="url(#shadow)">
    <text x="10" y="42" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="29" font-weight="900" fill="url(#mark)" letter-spacing="-2">JP</text>
    <circle cx="50" cy="41" r="3.5" fill="#0891b2"/>
  </g>
  <style>
    @media (prefers-color-scheme: dark) {
      rect:first-of-type { fill: #1e293b; }
      rect:nth-of-type(2) { fill: #25364a; stroke: #7dd3fc; stroke-opacity: .35; }
      circle { fill: #7dd3fc; }
    }
  </style>
</svg>
