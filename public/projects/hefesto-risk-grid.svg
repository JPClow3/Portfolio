<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Hefesto risk grid visual</title>
  <desc id="desc">A cold blue analytical risk grid with map-like cells, contour lines, and model signal traces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".58" stop-color="#eaf6fb"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="gridLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0891b2" stop-opacity=".28"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity=".16"/>
    </linearGradient>
    <radialGradient id="riskA" cx="52%" cy="44%" r="48%">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity=".34"/>
      <stop offset=".56" stop-color="#22d3ee" stop-opacity=".13"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="riskB" cx="76%" cy="66%" r="36%">
      <stop offset="0" stop-color="#2563eb" stop-opacity=".26"/>
      <stop offset=".72" stop-color="#38bdf8" stop-opacity=".08"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#riskA)"/>
  <rect width="1200" height="675" fill="url(#riskB)"/>

  <g opacity=".5" stroke="url(#gridLine)" stroke-width="1">
    <path d="M0 95H1200M0 175H1200M0 255H1200M0 335H1200M0 415H1200M0 495H1200M0 575H1200"/>
    <path d="M90 0V675M180 0V675M270 0V675M360 0V675M450 0V675M540 0V675M630 0V675M720 0V675M810 0V675M900 0V675M990 0V675M1080 0V675"/>
  </g>

