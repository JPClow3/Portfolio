  <g opacity=".76">
    <rect x="96" y="86" width="264" height="94" rx="14" fill="#f8fafc" fill-opacity=".78" stroke="#94a3b8" stroke-opacity=".5"/>
    <text x="126" y="125" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a">HEFESTO</text>
    <text x="126" y="154" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#475569" letter-spacing="2">DAILY RISK MODEL</text>
  </g>

  <g opacity=".85" font-family="Inter, system-ui, sans-serif">
    <rect x="832" y="474" width="252" height="104" rx="14" fill="#0f172a" fill-opacity=".72"/>
