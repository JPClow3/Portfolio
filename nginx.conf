server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://secure.gravatar.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.web3forms.com https://api.github.com https://challenges.cloudflare.com https://*.workers.dev; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://api.web3forms.com" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Long-lived cache for hashed assets (Astro appends content hashes)
    location ~* /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Medium cache for fonts and static assets
    location ~* \.(woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp|avif|pdf)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # No cache for HTML (ensures fresh content)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # SSG routing: try exact file, then directory index, then .html extension, then 404
    location / {
        try_files $uri $uri/index.html $uri.html /404.html;
    }
}
