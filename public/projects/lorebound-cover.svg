  <g fill="#d8b4fe" filter="url(#glow)"><circle cx="202" cy="467" r="10"/><circle cx="594" cy="284" r="12"/><circle cx="880" cy="215" r="10"/><circle cx="969" cy="366" r="10"/></g>
  <g fill="#171437" stroke="#8b5cf6" stroke-opacity=".7"><rect x="120" y="385" width="224" height="132" rx="16"/><rect x="491" y="205" width="206" height="145" rx="16"/><rect x="797" y="131" width="177" height="122" rx="16"/><rect x="874" y="303" width="194" height="128" rx="16"/></g>
  <g fill="#e9d5ff" font-family="Inter, Arial, sans-serif"><text x="145" y="425" font-size="16" opacity=".76">CHAPTER 01</text><text x="145" y="459" font-size="24" font-weight="700">A promise in ash</text><text x="516" y="246" font-size="16" opacity=".76">CHOICE REMEMBERED</text><text x="516" y="282" font-size="24" font-weight="700">Trust the envoy</text><text x="822" y="171" font-size="16" opacity=".76">MEMORY</text><text x="822" y="207" font-size="23" font-weight="700">The old oath</text><text x="899" y="343" font-size="16" opacity=".76">TURN</text><text x="899" y="379" font-size="23" font-weight="700">Write your path</text></g>
