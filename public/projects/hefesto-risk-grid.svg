    <path d="M330 250c27 8 52 4 76-12 37-24 74 13 96 48 19 31 69 18 77 56 6 31-29 40-53 55-27 16-37 53-70 54-31 1-48-27-76-25-34 3-65 25-84 4-19-21 4-50-10-75-16-29-54-39-45-70 8-28 54-22 89-35Z" fill="#38bdf8" fill-opacity=".1" stroke="#0284c7" stroke-opacity=".42" stroke-width="2"/>
